#数据库的连接信息
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/tlias
    username: root
    password: "048422"
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

#mybatis设置
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

#本地文件上传路径
file:
  upload:
    path: D:/images/

#阿里云OSS
aliyun:
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    accessKeyId: ${OSS_ACCESS_KEY_ID}
    accessKeySecret: ${OSS_ACCESS_KEY_SECRET}
    bucketName: web-tlias12367

#开启事务管理日志
logging:
  level:
    org.springframework.jdbc.support.JdbcTransactionManager: debug

#JWT令牌配置（密钥从硬编码移到配置文件，便于不同环境使用不同密钥）
jwt:
  sign-key: mushuting    # JWT签名密钥（生产环境应改为更长的随机字符串）
  expire: 43200000       # JWT过期时间（毫秒），43200000 = 12小时